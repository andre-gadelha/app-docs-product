<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Docs Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
        }
        .sidebar {
            width: 250px;
            background-color: #343a40;
            color: white;
            min-height: calc(100vh - 56px);
        }
        .sidebar a {
            color: #ccc;
            text-decoration: none;
            padding: 10px 20px;
            display: block;
        }
        .sidebar a:hover {
            background-color: #495057;
            color: white;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
        .submenu {
            padding-left: 30px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">App Docs</a>
            <div class="ms-auto d-flex align-items-center">
                <span class="text-light me-3">
                    <i class="bi bi-person-circle"></i> {{ session.get('user', 'Visitante') }}
                </span>
                <a href="{{ url_for('main.logout') }}" class="btn btn-outline-danger btn-sm">Logoff</a>
            </div>
        </div>
    </nav>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="p-3">
                <h5>Menu Principal</h5>
            </div>
            
            <a href="#docProjeto" data-bs-toggle="collapse" class="dropdown-toggle">
                Documentos do Projeto
            </a>
            <div class="collapse show" id="docProjeto">
                <a href="{{ url_for('documentos.proposta_os') }}" class="submenu">Proposta de OS</a>
                <a href="{{ url_for('documentos.relatorio_entrega') }}" class="submenu">Relatório de Entrega</a>
            </div>

            <a href="#docRequisitos" data-bs-toggle="collapse" class="dropdown-toggle">
                Documentos de Requisitos
            </a>
            <div class="collapse" id="docRequisitos">
                <a href="#" class="submenu">Em breve...</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
